services:
  - type: web
    name: ai-extractor
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-extractor-db
          property: connectionString
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: LLM_TIMEOUT_SECONDS
        value: "30"

databases:
  - name: ai-extractor-db
    plan: free
