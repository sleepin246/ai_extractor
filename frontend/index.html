<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>AI Extractor</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      body{margin:0;background:#f7f7f8;color:#172033;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.fallback-shell{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}.fallback-card{width:min(560px,100%);background:#fff;border:1px solid #e5e7eb;border-radius:24px;box-shadow:0 24px 80px rgba(15,23,42,.08);padding:24px}.fallback-card h1{margin:0 0 8px;font-size:26px}.fallback-card p{margin:0 0 18px;color:#64748b;line-height:1.6}.fallback-card textarea{width:100%;min-height:110px;border:1px solid #dbe4ff;border-radius:16px;padding:12px;font:inherit}.fallback-card input{display:block;margin:12px 0}.fallback-card button{border:0;border-radius:999px;background:#111827;color:#fff;padding:12px 18px;font:inherit}.fallback-note{font-size:13px;color:#64748b;margin-top:14px}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <main id="static-fallback" class="fallback-shell">
      <section class="fallback-card">
        <h1>AI Extractor</h1>
        <p>页面正在加载。如果长时间停留在这里，仍可用下面的基础表单提交到后端。</p>
        <form action="/api/parse" method="post" enctype="multipart/form-data">
          <textarea name="text" placeholder="输入说明，或选择图片/文件后提交..."></textarea>
          <input name="files" type="file" multiple />
          <button type="submit">提交识别</button>
        </form>
        <div class="fallback-note">聊天界面加载成功后会自动替换此基础界面。</div>
      </section>
    </main>
    <noscript>当前浏览器禁用了 JavaScript，已显示基础提交表单。</noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
