services:
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://ai_extractor:ai_extractor@postgres:5432/ai_extractor
    ports:
      - "8000:8000"
    volumes:
      - ai_extractor_tmp:/tmp/ai_extractor
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_extractor
      POSTGRES_USER: ai_extractor
      POSTGRES_PASSWORD: ai_extractor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_extractor -d ai_extractor"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  ai_extractor_tmp:
  postgres_data:
