services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ai_extractor_tmp:/tmp/ai_extractor
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
volumes:
  ai_extractor_tmp:
